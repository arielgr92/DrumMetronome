<html lang="en">

<title>DRUMTEMPO — Metronome Visualizer</title>

  :root {
    --bg: #0c0c0c;
    --surface: #141414;
    --wall-bg: #1c1c1c;
    --wall-border: #2e2e2e;
    --accent: #e84040;
    --text: #eeebe6;
    --muted: #555;
    --track: #1e1e1e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    padding: 18px 36px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid #1a1a1a;
    z-index: 10;
  }

    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem;
    letter-spacing: 0.18em;
    color: var(--accent);
  }
  .logo span { color: var(--text); }
  .time-sig-label {
    font-size: 0.6rem;
    letter-spacing: 0.25em;
    color: var(--muted);
    text-transform: uppercase;
  }

    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
    width: 100%;
    max-width: 860px;
    padding: 20px;
  }

    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    width: 100%;
  }

    letter-spacing: 0.3em;
    color: var(--muted);
    text-transform: uppercase;
  }
